<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="blocknote-bundle.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #editor-container { width: 100%; height: 100%; overflow-y: auto; }
    #root { width: 100%; }
    #loading-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #888;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    /* Notion-style typography overrides */
    .bn-container {
      --bn-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
    }

    .bn-editor {
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-inline: 27px !important;
    }

    /* Heading sizes: compact Notion-like scale */
    [data-content-type=heading]                 { --level: 1.6em !important; }
    [data-content-type=heading][data-level="2"] { --level: 1.45em !important; }
    [data-content-type=heading][data-level="3"] { --level: 1.25em !important; }
    [data-content-type=heading][data-level="4"] { --level: 1em !important; }
    [data-content-type=heading][data-level="5"] { --level: 0.95em !important; }
    [data-content-type=heading][data-level="6"] { --level: 0.875em !important; }

    /* Tighter heading line-height + top padding for visual separation */
    .bn-block-content[data-content-type=heading] {
      line-height: 1.3;
      letter-spacing: -0.01em;
      padding-top: 0.6em;
    }

    /* Side menu heights to match smaller headings */
    .bn-side-menu[data-block-type=heading][data-level="1"] { height: 36px !important; }
    .bn-side-menu[data-block-type=heading][data-level="2"] { height: 30px !important; }
    .bn-side-menu[data-block-type=heading][data-level="3"] { height: 26px !important; }

    /* Ghostty theme integration: background/text sync */
    body.ghostty-themed { background: var(--ghostty-bg); color: var(--ghostty-fg); }
    body.ghostty-themed .bn-container {
      --bn-colors-editor-text: var(--ghostty-fg) !important;
      --bn-colors-editor-background: var(--ghostty-bg) !important;
      --bn-colors-menu-text: var(--ghostty-fg) !important;
      --bn-colors-menu-background: var(--ghostty-menu-bg) !important;
      --bn-colors-tooltip-text: var(--ghostty-fg) !important;
      --bn-colors-tooltip-background: var(--ghostty-menu-bg) !important;
      --bn-colors-hovered-text: var(--ghostty-fg) !important;
      --bn-colors-hovered-background: var(--ghostty-hover-bg) !important;
      --bn-colors-selected-text: var(--ghostty-bg) !important;
      --bn-colors-selected-background: var(--ghostty-fg) !important;
      --bn-colors-disabled-text: var(--ghostty-dim) !important;
      --bn-colors-disabled-background: var(--ghostty-menu-bg) !important;
    }
    body.ghostty-themed .bn-side-menu,
    body.ghostty-themed .bn-drag-handle-menu {
      color: var(--ghostty-dim) !important;
    }

    /* ── Obsidian-style frontmatter properties panel ── */
    #frontmatter-panel {
      display: none;
      margin: 8px 27px 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(128, 128, 128, 0.06);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }
    #frontmatter-panel.visible { display: block; }

    .fm-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-bottom: 4px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .fm-header-label {
      font-size: 12px;
      font-weight: 600;
      opacity: 0.5;
    }
    .fm-chevron {
      font-size: 10px;
      opacity: 0.4;
      transition: transform 0.15s ease;
    }
    .fm-header:hover .fm-header-label,
    .fm-header:hover .fm-chevron { opacity: 0.8; }
    .fm-collapsed .fm-chevron { transform: rotate(-90deg); }
    .fm-collapsed .fm-body { display: none; }

    .fm-body { padding-top: 2px; }

    .fm-row {
      display: flex;
      align-items: baseline;
      padding: 2px 0;
      gap: 12px;
    }
    .fm-row + .fm-row {
      border-top: 1px solid rgba(128, 128, 128, 0.08);
    }

    .fm-key {
      min-width: 80px;
      flex-shrink: 0;
      font-size: 13px;
      opacity: 0.45;
      font-weight: 500;
    }
    .fm-value {
      font-size: 13px;
      opacity: 0.8;
      word-break: break-word;
    }

    /* Tag pills (for tags/categories arrays) */
    .fm-tag {
      display: inline-block;
      padding: 1px 8px;
      margin: 1px 4px 1px 0;
      border-radius: 4px;
      background: rgba(128, 128, 128, 0.1);
      font-size: 12px;
    }

    /* Ghostty theme overrides for frontmatter panel */
    body.ghostty-themed #frontmatter-panel {
      background: var(--ghostty-hover-bg);
      color: var(--ghostty-fg);
    }
    body.ghostty-themed .fm-tag {
      background: rgba(128, 128, 128, 0.15);
    }

    /* ── Find bar ── */
    #find-bar {
      display: none;
      position: fixed;
      top: 8px;
      right: 16px;
      z-index: 1000;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(240, 240, 240, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }
    #find-bar.visible { display: flex; }

    #find-input {
      width: 180px;
      padding: 4px 8px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      outline: none;
    }
    #find-input:focus {
      border-color: rgba(0, 100, 255, 0.4);
      box-shadow: 0 0 0 2px rgba(0, 100, 255, 0.1);
    }

    #find-count {
      min-width: 60px;
      text-align: center;
      font-size: 11px;
      color: #666;
      white-space: nowrap;
    }

    #find-bar button {
      padding: 2px 6px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      color: #444;
    }
    #find-bar button:hover {
      background: rgba(255, 255, 255, 0.95);
    }

    /* Dark theme: Ghostty-themed find bar */
    body.ghostty-themed #find-bar {
      background: var(--ghostty-menu-bg);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    body.ghostty-themed #find-input {
      background: var(--ghostty-bg);
      color: var(--ghostty-fg);
      border-color: rgba(255, 255, 255, 0.1);
    }
    body.ghostty-themed #find-input:focus {
      border-color: rgba(100, 160, 255, 0.5);
      box-shadow: 0 0 0 2px rgba(100, 160, 255, 0.15);
    }
    body.ghostty-themed #find-count {
      color: var(--ghostty-dim);
    }
    body.ghostty-themed #find-bar button {
      background: var(--ghostty-hover-bg);
      color: var(--ghostty-fg);
      border-color: rgba(255, 255, 255, 0.06);
    }
    body.ghostty-themed #find-bar button:hover {
      background: var(--ghostty-bg);
    }

    /* CSS Custom Highlight API for search results */
    ::highlight(search-results) {
      background-color: rgba(255, 220, 50, 0.35);
    }
    ::highlight(current-match) {
      background-color: rgba(255, 150, 30, 0.5);
    }
  </style>
</head>
<body>
  <div id="editor-container">
    <div id="frontmatter-panel"></div>
    <div id="root"></div>
  </div>
  <div id="find-bar">
    <input id="find-input" type="text" placeholder="Find..." spellcheck="false" autocomplete="off" />
    <span id="find-count"></span>
    <button id="find-prev" title="Previous (Shift+Enter)">&#9650;</button>
    <button id="find-next" title="Next (Enter)">&#9660;</button>
    <button id="find-close" title="Close (Esc)">&#10005;</button>
  </div>
  <div id="loading-indicator">Loading BlockNote...</div>

  <!-- Local bundle: React + BlockNote (no CDN dependency) -->
  <script src="blocknote-bundle.js"></script>

  <script>
    // Helper: safely post a message to the native host
    function postMessage(name, body) {
      try {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[name]) {
          window.webkit.messageHandlers[name].postMessage(body);
        }
      } catch (e) {
        console.error('postMessage error:', name, e);
      }
    }

    var { React, createRoot, useCreateBlockNote, BlockNoteView } = window.__BN;
    var h = React.createElement;

    var editorInstance = null;
    var pendingMarkdown = null;
    var storedFrontmatter = null;
    var originalBodyMarkdown = null;

    // Strip YAML frontmatter before passing to BlockNote, store it for later.
    // Frontmatter must start at the very first character of the file.
    function extractFrontmatter(md) {
      var match = md.match(/^---[ \t]*\n([\s\S]*?)\n---[ \t]*(\n|$)/);
      if (match) {
        storedFrontmatter = match[0];
        renderFrontmatterPanel(match[1]);
        return md.slice(match[0].length);
      }
      storedFrontmatter = null;
      renderFrontmatterPanel(null);
      return md;
    }

    // Re-attach stored frontmatter to markdown output
    function prependFrontmatter(md) {
      if (!storedFrontmatter) return md;
      var sep = md.startsWith('\n') ? '' : '\n';
      return storedFrontmatter + sep + md;
    }

    // ── Frontmatter panel rendering ──

    // Tags-like keys that should render as pills
    var tagKeys = ['tags', 'tag', 'categories', 'category', 'keywords', 'aliases'];

    // Parse simple YAML into [{key, value}] — handles scalars, inline arrays, list arrays
    function parseSimpleYaml(yaml) {
      var result = [];
      var lines = yaml.split('\n');
      var i = 0;
      while (i < lines.length) {
        var line = lines[i];
        var m = line.match(/^([\w][\w\s-]*?):\s*(.*)/);
        if (m) {
          var key = m[1].trim();
          var val = m[2].trim();
          // Inline array: key: [a, b, c]
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(function(s) { return s.trim(); });
          }
          // Multi-line list array
          else if (val === '') {
            var items = [];
            while (i + 1 < lines.length && /^\s+-\s+/.test(lines[i + 1])) {
              i++;
              items.push(lines[i].replace(/^\s+-\s+/, '').trim());
            }
            if (items.length > 0) val = items;
          }
          result.push({ key: key, value: val });
        }
        i++;
      }
      return result;
    }

    function renderFrontmatterPanel(yamlContent) {
      var panel = document.getElementById('frontmatter-panel');
      if (!yamlContent) {
        panel.classList.remove('visible');
        panel.innerHTML = '';
        return;
      }

      var props = parseSimpleYaml(yamlContent);
      if (props.length === 0) {
        panel.classList.remove('visible');
        panel.innerHTML = '';
        return;
      }

      var html = '<div class="fm-header" onclick="this.parentElement.classList.toggle(\'fm-collapsed\')">';
      html += '<span class="fm-chevron">&#9662;</span>';
      html += '<span class="fm-header-label">Properties</span>';
      html += '</div>';
      html += '<div class="fm-body">';

      for (var i = 0; i < props.length; i++) {
        var p = props[i];
        var isTag = tagKeys.indexOf(p.key.toLowerCase()) !== -1;
        html += '<div class="fm-row">';
        html += '<span class="fm-key">' + escapeHtml(p.key) + '</span>';

        if (Array.isArray(p.value) && isTag) {
          html += '<span class="fm-value">';
          for (var j = 0; j < p.value.length; j++) {
            html += '<span class="fm-tag">' + escapeHtml(p.value[j]) + '</span>';
          }
          html += '</span>';
        } else if (Array.isArray(p.value)) {
          html += '<span class="fm-value">' + escapeHtml(p.value.join(', ')) + '</span>';
        } else {
          html += '<span class="fm-value">' + escapeHtml(String(p.value)) + '</span>';
        }

        html += '</div>';
      }

      html += '</div>';
      panel.innerHTML = html;
      panel.classList.add('visible');
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // JS Bridge: called from Swift to set markdown content
    window.setMarkdown = async function(text) {
      var body = extractFrontmatter(text);
      originalBodyMarkdown = body;
      if (editorInstance) {
        var blocks = await editorInstance.tryParseMarkdownToBlocks(body);
        editorInstance.replaceBlocks(editorInstance.document, blocks);
      } else {
        pendingMarkdown = body;
      }
    };

    // JS Bridge: called from Swift to get current content as markdown
    window.getMarkdown = async function() {
      if (editorInstance) {
        var bnOutput = normalizeMarkdown(await editorInstance.blocksToMarkdownLossy(editorInstance.document));
        var merged = mergeWithOriginal(originalBodyMarkdown, bnOutput);
        originalBodyMarkdown = merged;
        return prependFrontmatter(merged);
      }
      return '';
    };

    // Normalize markdown output from BlockNote's blocksToMarkdownLossy():
    // - Restore '-' list markers (BlockNote defaults to '*')
    // - Remove trailing '\' hard-break markers inserted on soft breaks
    // Skips content inside fenced code blocks to avoid false matches.
    function normalizeMarkdown(md) {
      var lines = md.split('\n');
      var inCodeBlock = false;
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (/^(`{3,}|~{3,})/.test(line.trimStart())) {
          inCodeBlock = !inCodeBlock;
          continue;
        }
        if (inCodeBlock) continue;
        // Replace '* ' list marker with '- ' (skip thematic breaks like '* * *')
        if (/^(\s*)\* /.test(line) && !/^\s*(\*\s*){3,}$/.test(line)) {
          lines[i] = line.replace(/^(\s*)\* /, '$1- ');
        }
        // Remove trailing '\' hard-break marker (odd count only — even = escaped pairs)
        var trailingMatch = lines[i].match(/\\+$/);
        if (trailingMatch && trailingMatch[0].length % 2 === 1) {
          lines[i] = lines[i].slice(0, -1).trimEnd();
        }
      }
      return lines.join('\n');
    }

    // ── Original-preserving merge (diff-based round-trip fidelity) ──

    // Split markdown into logical blocks (separated by blank lines).
    // Respects fenced code blocks so internal blank lines don't cause splits.
    // Returns { blocks: [string], gaps: [string], trailing: string }
    //   gaps[i] = exact separator text between blocks[i] and blocks[i+1]
    //   trailing = text after the last block (preserves trailing newlines)
    function splitMarkdownBlocks(md) {
      if (!md) return { blocks: [], gaps: [], trailing: '' };
      var lines = md.split('\n');
      var blocks = [];
      var current = [];
      var inCodeBlock = false;
      for (var i = 0; i < lines.length; i++) {
        if (/^(`{3,}|~{3,})/.test(lines[i].trimStart())) {
          inCodeBlock = !inCodeBlock;
          current.push(lines[i]);
          continue;
        }
        if (!inCodeBlock && lines[i].trim() === '') {
          if (current.length > 0) {
            blocks.push(current.join('\n'));
            current = [];
          }
        } else {
          current.push(lines[i]);
        }
      }
      if (current.length > 0) {
        blocks.push(current.join('\n'));
      }
      // Extract exact gaps by locating each block's position in source text
      var gaps = [];
      var trailing = '';
      if (blocks.length > 0) {
        var searchFrom = 0;
        var prevEnd = 0;
        for (var i = 0; i < blocks.length; i++) {
          var pos = md.indexOf(blocks[i], searchFrom);
          if (i > 0) gaps.push(md.substring(prevEnd, pos));
          prevEnd = pos + blocks[i].length;
          searchFrom = prevEnd;
        }
        trailing = md.substring(prevEnd);
      }
      return { blocks: blocks, gaps: gaps, trailing: trailing };
    }

    // Extract plain-text fingerprint from a markdown block (strip all formatting).
    function textFingerprint(block) {
      var t = block;
      t = t.replace(/^(`{3,}|~{3,}).*$/gm, '');          // code fence markers
      t = t.replace(/^>\s*/gm, '');                         // blockquote markers
      t = t.replace(/^#{1,6}\s+/gm, '');                    // heading markers
      t = t.replace(/^(\s*)([-*+]|\d+\.)\s+/gm, '$1');      // list markers
      t = t.replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1');        // images
      t = t.replace(/\[([^\]]*)\]\([^)]*\)/g, '$1');         // links
      t = t.replace(/(\*{1,3}|_{1,3}|~~)(.*?)\1/g, '$2');   // bold/italic/strike
      t = t.replace(/`([^`]*)`/g, '$1');                     // inline code
      t = t.replace(/\s+/g, ' ').trim();
      return t.toLowerCase();
    }

    // Longest Common Subsequence of two fingerprint arrays.
    // Returns array of { origIdx, bnIdx } matched pairs.
    function computeLCS(a, b) {
      var m = a.length, n = b.length;
      var dp = [];
      for (var i = 0; i <= m; i++) {
        dp[i] = new Array(n + 1);
        for (var j = 0; j <= n; j++) {
          if (i === 0 || j === 0) dp[i][j] = 0;
          else if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1] + 1;
          else dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
        }
      }
      var matches = [];
      var i = m, j = n;
      while (i > 0 && j > 0) {
        if (a[i-1] === b[j-1]) {
          matches.unshift({ origIdx: i-1, bnIdx: j-1 });
          i--; j--;
        } else if (dp[i-1][j] > dp[i][j-1]) {
          i--;
        } else {
          j--;
        }
      }
      return matches;
    }

    // Merge BlockNote output with original markdown, preserving original text
    // for blocks whose plain-text content hasn't changed.
    // Also preserves original inter-block gaps when adjacent blocks are both from original.
    function mergeWithOriginal(original, bnOutput) {
      if (!original) return bnOutput;
      var origResult = splitMarkdownBlocks(original);
      var bnResult = splitMarkdownBlocks(bnOutput);
      if (origResult.blocks.length === 0) return bnOutput;
      if (bnResult.blocks.length === 0) return bnOutput;

      var origFP = origResult.blocks.map(textFingerprint);
      var bnFP = bnResult.blocks.map(textFingerprint);
      var matches = computeLCS(origFP, bnFP);

      var bnToOrig = {};
      for (var k = 0; k < matches.length; k++) {
        bnToOrig[matches[k].bnIdx] = matches[k].origIdx;
      }

      var parts = [];
      for (var i = 0; i < bnResult.blocks.length; i++) {
        // Insert gap before this block (except before the first)
        if (i > 0) {
          var prevOrig = bnToOrig.hasOwnProperty(i - 1) ? bnToOrig[i - 1] : -1;
          var currOrig = bnToOrig.hasOwnProperty(i) ? bnToOrig[i] : -1;
          if (prevOrig >= 0 && currOrig >= 0 && currOrig === prevOrig + 1) {
            // Both adjacent blocks from consecutive original positions — use original gap
            parts.push(origResult.gaps[prevOrig]);
          } else {
            parts.push('\n\n');
          }
        }
        if (bnToOrig.hasOwnProperty(i)) {
          parts.push(origResult.blocks[bnToOrig[i]]);
        } else {
          parts.push(bnResult.blocks[i]);
        }
      }

      var merged = parts.join('');
      // Preserve trailing whitespace from original (e.g. final newline)
      if (origResult.trailing) {
        merged += origResult.trailing;
      }
      return merged;
    }

    // Helper: determine if a hex color is "light" by computing relative luminance
    function hexIsLight(hex) {
      var r = parseInt(hex.slice(1, 3), 16) / 255;
      var g = parseInt(hex.slice(3, 5), 16) / 255;
      var b = parseInt(hex.slice(5, 7), 16) / 255;
      return (0.2126 * r + 0.7152 * g + 0.0722 * b) > 0.5;
    }

    // Helper: lighten or darken a hex color by a factor
    function adjustColor(hex, factor) {
      var r = parseInt(hex.slice(1, 3), 16);
      var g = parseInt(hex.slice(3, 5), 16);
      var b = parseInt(hex.slice(5, 7), 16);
      if (factor > 0) {
        r = Math.min(255, Math.round(r + (255 - r) * factor));
        g = Math.min(255, Math.round(g + (255 - g) * factor));
        b = Math.min(255, Math.round(b + (255 - b) * factor));
      } else {
        r = Math.max(0, Math.round(r * (1 + factor)));
        g = Math.max(0, Math.round(g * (1 + factor)));
        b = Math.max(0, Math.round(b * (1 + factor)));
      }
      return '#' + [r, g, b].map(function(c) { return c.toString(16).padStart(2, '0'); }).join('');
    }

    // Global API: Apply Ghostty terminal configuration (font size + theme).
    window._ghosttyTheme = null;

    window.applyGhosttyConfig = function(fontSize, fontFamily, bgColor, fgColor) {
      var isLight = hexIsLight(bgColor);
      var menuBg = isLight ? adjustColor(bgColor, -0.06) : adjustColor(bgColor, 0.12);
      var hoverBg = isLight ? adjustColor(bgColor, -0.1) : adjustColor(bgColor, 0.18);
      var dimColor = isLight ? adjustColor(fgColor, 0.5) : adjustColor(fgColor, -0.4);

      document.body.style.setProperty('--ghostty-bg', bgColor);
      document.body.style.setProperty('--ghostty-fg', fgColor);
      document.body.style.setProperty('--ghostty-menu-bg', menuBg);
      document.body.style.setProperty('--ghostty-hover-bg', hoverBg);
      document.body.style.setProperty('--ghostty-dim', dimColor);
      document.body.classList.add('ghostty-themed');

      // Set BlockNote's color-scheme attribute to match
      var container = document.querySelector('.bn-container');
      if (container) {
        container.setAttribute('data-color-scheme', isLight ? 'light' : 'dark');
      }

      // Apply font size from Ghostty config
      if (fontSize) {
        document.querySelector('.bn-editor').style.fontSize = fontSize + 'px';
      }

      // Store theme for React re-render
      window._ghosttyTheme = isLight ? 'light' : 'dark';
      if (window._setTheme) window._setTheme(window._ghosttyTheme);
    };

    // Keyboard shortcuts: Cmd+S → save, Cmd+E → switch to Monaco mode
    document.addEventListener('keydown', async function(e) {
      if ((e.metaKey || e.ctrlKey) && e.code === 'KeyS') {
        e.preventDefault();
        var md = await window.getMarkdown();
        postMessage('save', { content: md });
      }
      if ((e.metaKey || e.ctrlKey) && e.code === 'KeyE') {
        e.preventDefault();
        var md = await window.getMarkdown();
        postMessage('switchMode', { content: md });
      }
    });

    // ── Find bar (Cmd+F) ──
    (function setupFindBar() {
      var findBar = document.getElementById('find-bar');
      var findInput = document.getElementById('find-input');
      var findCount = document.getElementById('find-count');
      var findPrevBtn = document.getElementById('find-prev');
      var findNextBtn = document.getElementById('find-next');
      var findCloseBtn = document.getElementById('find-close');

      var matches = [];       // Array of Range objects
      var currentIndex = -1;
      var matchesCapped = false;
      var searchDebounceTimer = null;
      var contentObserver = null;
      var contentDebounceTimer = null;

      // ── Core search logic ──

      function performSearch() {
        clearHighlights();
        matches = [];
        currentIndex = -1;

        var query = findInput.value;
        if (!query) {
          findCount.textContent = '';
          return;
        }

        var editorEl = document.querySelector('.bn-editor');
        if (!editorEl) return;

        var MAX_MATCHES = 5000;
        var lowerQuery = query.toLowerCase();
        var walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT, null, false);
        var node;
        var capped = false;

        while ((node = walker.nextNode())) {
          var text = node.textContent.toLowerCase();
          var startPos = 0;
          var idx;
          while ((idx = text.indexOf(lowerQuery, startPos)) !== -1) {
            var range = document.createRange();
            range.setStart(node, idx);
            range.setEnd(node, idx + query.length);
            matches.push(range);
            if (matches.length >= MAX_MATCHES) { capped = true; break; }
            startPos = idx + 1;
          }
          if (capped) break;
        }

        if (matches.length === 0) {
          findCount.textContent = 'No results';
          return;
        }

        matchesCapped = capped;
        currentIndex = 0;
        applyHighlights();
        scrollToCurrent();
        updateCounter();
      }

      function applyHighlights() {
        if (!CSS.highlights) return;
        if (matches.length === 0) {
          clearHighlights();
          return;
        }
        var allHL = new Highlight();
        for (var i = 0; i < matches.length; i++) allHL.add(matches[i]);
        CSS.highlights.set('search-results', allHL);
        if (currentIndex >= 0 && currentIndex < matches.length) {
          CSS.highlights.set('current-match', new Highlight(matches[currentIndex]));
        }
      }

      function clearHighlights() {
        if (!CSS.highlights) return;
        CSS.highlights.delete('search-results');
        CSS.highlights.delete('current-match');
      }

      function updateCounter() {
        if (matches.length === 0) {
          findCount.textContent = findInput.value ? 'No results' : '';
        } else {
          var total = matchesCapped ? matches.length + '+' : matches.length;
          findCount.textContent = (currentIndex + 1) + ' of ' + total;
        }
      }

      function scrollToCurrent() {
        if (currentIndex < 0 || currentIndex >= matches.length) return;
        var range = matches[currentIndex];
        // Check if range is still valid (nodes in document)
        try {
          var rect = range.getBoundingClientRect();
          if (rect.width > 0 || rect.height > 0) {
            var container = document.getElementById('editor-container');
            var containerRect = container.getBoundingClientRect();
            // Scroll if current match is not visible
            if (rect.top < containerRect.top + 40 || rect.bottom > containerRect.bottom - 10) {
              var el = range.startContainer.parentElement;
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }
        } catch (e) { /* range invalidated by DOM mutation */ }
      }

      // ── Navigation ──

      function goToNext() {
        if (matches.length === 0) return;
        currentIndex = (currentIndex + 1) % matches.length;
        applyHighlights();
        scrollToCurrent();
        updateCounter();
      }

      function goToPrev() {
        if (matches.length === 0) return;
        currentIndex = (currentIndex - 1 + matches.length) % matches.length;
        applyHighlights();
        scrollToCurrent();
        updateCounter();
      }

      // ── Open / Close ──

      function openFindBar() {
        findBar.classList.add('visible');
        findInput.focus();
        findInput.select();
        if (findInput.value) {
          performSearch();
        }
        startContentObserver();
      }

      function closeFindBar() {
        findBar.classList.remove('visible');
        clearHighlights();
        matches = [];
        currentIndex = -1;
        matchesCapped = false;
        findCount.textContent = '';
        clearTimeout(searchDebounceTimer);
        stopContentObserver();
        // Restore focus to editor
        if (editorInstance) {
          try { editorInstance.focus(); } catch (e) {}
        }
      }

      // ── MutationObserver: re-search on edits while find bar is open ──

      function startContentObserver() {
        stopContentObserver();
        var editorEl = document.querySelector('.bn-editor');
        if (!editorEl) return;

        contentObserver = new MutationObserver(function() {
          if (!findBar.classList.contains('visible') || !findInput.value) return;
          // Immediately clear stale highlights — Ranges may be invalidated by DOM mutation
          clearHighlights();
          clearTimeout(contentDebounceTimer);
          contentDebounceTimer = setTimeout(function() {
            var prevQuery = findInput.value;
            if (prevQuery) performSearch();
          }, 300);
        });

        contentObserver.observe(editorEl, {
          childList: true,
          subtree: true,
          characterData: true
        });
      }

      function stopContentObserver() {
        if (contentObserver) {
          contentObserver.disconnect();
          contentObserver = null;
        }
        clearTimeout(contentDebounceTimer);
      }

      // ── Event handlers: input field ──

      // IME composition guard: skip search during intermediate composition states
      // (e.g. Korean ㅎ → 하 → 한 triggers multiple input events per syllable)
      var findIMEActive = false;
      findInput.addEventListener('compositionstart', function() { findIMEActive = true; });
      findInput.addEventListener('compositionend', function() {
        findIMEActive = false;
        clearTimeout(searchDebounceTimer);
        performSearch();
      });

      findInput.addEventListener('input', function() {
        if (findIMEActive) return;
        clearTimeout(searchDebounceTimer);
        searchDebounceTimer = setTimeout(performSearch, 150);
      });

      findInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          goToNext();
        } else if (e.key === 'Enter' && e.shiftKey) {
          e.preventDefault();
          goToPrev();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          closeFindBar();
        } else if ((e.metaKey || e.ctrlKey) && e.code === 'KeyG' && !e.shiftKey) {
          e.preventDefault();
          goToNext();
        } else if ((e.metaKey || e.ctrlKey) && e.code === 'KeyG' && e.shiftKey) {
          e.preventDefault();
          goToPrev();
        }
      });

      // ── Event handlers: document-level (capture phase) ──

      document.addEventListener('keydown', function(e) {
        if ((e.metaKey || e.ctrlKey) && e.code === 'KeyF') {
          e.preventDefault();
          e.stopPropagation();
          openFindBar();
          return;
        }
        if (!findBar.classList.contains('visible')) return;

        if ((e.metaKey || e.ctrlKey) && e.code === 'KeyG' && !e.shiftKey) {
          e.preventDefault();
          e.stopPropagation();
          goToNext();
        } else if ((e.metaKey || e.ctrlKey) && e.code === 'KeyG' && e.shiftKey) {
          e.preventDefault();
          e.stopPropagation();
          goToPrev();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          e.stopPropagation();
          closeFindBar();
        }
      }, true);  // capture phase

      // Prevent ProseMirror from stealing focus when clicking on find bar
      findBar.addEventListener('mousedown', function(e) {
        e.stopPropagation();
      });

      // Button handlers
      findPrevBtn.addEventListener('click', goToPrev);
      findNextBtn.addEventListener('click', goToNext);
      findCloseBtn.addEventListener('click', closeFindBar);
    })();

    // ── Backspace handler: prevent sibling depth corruption in nested lists ──
    // ProseMirror's liftListItem wraps siblings into the current item before
    // lifting, which corrupts their nesting depth. We intercept Backspace in
    // the capture phase and use BlockNote's removeBlocks/updateBlock instead,
    // which only affect the target blockContainer without touching siblings.
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Backspace' || !editorInstance) return;
      // Don't interfere with Backspace during IME composition (e.g. deleting
      // part of a composed Korean syllable). Let the IME handle it.
      if (e.isComposing) return;

      var tiptap = editorInstance._tiptapEditor;
      var sel = tiptap.state.selection;

      // Only intercept: empty selection at text offset 0
      if (!sel.empty || sel.$from.parentOffset !== 0) return;

      var cursor = editorInstance.getTextCursorPosition();
      var block = cursor.block;

      // Only intercept nested paragraph leaves with a next sibling
      if (!cursor.parentBlock) return;
      if (block.type !== 'paragraph') return;
      if (block.children && block.children.length > 0) return;
      if (!cursor.nextBlock) return;

      e.preventDefault();
      e.stopImmediatePropagation();

      var content = block.content || [];
      var isEmpty = content.length === 0 ||
        (content.length === 1 && content[0].type === 'text' && !content[0].text);

      if (isEmpty) {
        // Empty block: remove it, move cursor to previous sibling or parent
        var target = cursor.prevBlock || cursor.parentBlock;
        editorInstance.removeBlocks([block]);
        editorInstance.setTextCursorPosition(target, 'end');
      } else if (cursor.prevBlock) {
        // Has content + previous sibling: merge into prev
        var prev = cursor.prevBlock;
        var merged = [].concat(prev.content || [], content);
        editorInstance.updateBlock(prev, { content: merged });
        editorInstance.removeBlocks([block]);
        editorInstance.setTextCursorPosition(prev, 'end');
      } else {
        // First child with content: merge into parent
        var parent = cursor.parentBlock;
        var merged = [].concat(parent.content || [], content);
        editorInstance.updateBlock(parent, { content: merged });
        editorInstance.removeBlocks([block]);
        editorInstance.setTextCursorPosition(parent, 'end');
      }
    }, true);  // capture phase — runs before ProseMirror/BlockNote handlers

    // Signal readiness to Swift
    postMessage('ready', true);

    // Mount BlockNote React app
    function App() {
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var initialTheme = window._ghosttyTheme || (prefersDark ? 'dark' : 'light');
      var themeState = React.useState(initialTheme);
      var theme = themeState[0];
      var setTheme = themeState[1];

      // Expose setter so applyGhosttyConfig can trigger re-render
      window._setTheme = setTheme;

      var editor = useCreateBlockNote();

      React.useEffect(function() {
        editorInstance = editor;
        if (pendingMarkdown !== null) {
          window.setMarkdown(pendingMarkdown);
          pendingMarkdown = null;
        }
        // Focus the contenteditable so clipboard shortcuts work immediately
        try { editor.focus(); } catch(e) {}

        // IME composition guard: prevent list item duplication during Korean input.
        //
        // Two layers of protection:
        // 1. DOM-level: beforeinput handler blocks spurious 'insertParagraph' events
        //    during composition. This catches depth-1 splits where the browser fires
        //    a beforeinput event.
        // 2. ProseMirror-level: filterTransaction plugin rejects transactions that
        //    would add new block nodes during composition. At depth 2+, ProseMirror
        //    creates splitting transactions from DOM mutation reconciliation WITHOUT
        //    firing beforeinput, so the DOM guard alone is insufficient.
        //
        // Shared IME state — both guards read these variables.
        var imeActive = false;
        var imeEndTimer = null;
        var enterTriggeredEnd = false;

        // Layer 1: DOM event listeners
        (function setupIMEGuard() {
          var editorEl = document.querySelector('.bn-editor');
          if (!editorEl) return;

          editorEl.addEventListener('compositionstart', function() {
            clearTimeout(imeEndTimer);
            imeActive = true;
            enterTriggeredEnd = false;
          }, true);

          // Detect Enter keydown during composition — the user intentionally
          // pressed Enter to end composition AND insert a line break.
          editorEl.addEventListener('keydown', function(e) {
            if (imeActive && (e.key === 'Enter' || e.keyCode === 13)) {
              enterTriggeredEnd = true;
            }
          }, true);

          editorEl.addEventListener('compositionend', function() {
            clearTimeout(imeEndTimer);
            if (enterTriggeredEnd) {
              imeActive = false;
              enterTriggeredEnd = false;
            } else {
              // Keep imeActive true across syllable boundaries and through
              // ProseMirror's post-composition reconciliation (which runs
              // asynchronously after compositionend).
              imeEndTimer = setTimeout(function() { imeActive = false; }, 100);
            }
          }, true);

          editorEl.addEventListener('beforeinput', function(e) {
            if ((imeActive || e.isComposing) &&
                (e.inputType === 'insertParagraph' || e.inputType === 'insertLineBreak')) {
              e.preventDefault();
            }
          }, true);
        })();

        // Layer 2: ProseMirror transaction filter
        // At depth 2+, ProseMirror's DOM mutation reconciliation creates a
        // splitting transaction (ReplaceStep with multiple block children)
        // without any beforeinput event. We catch this at the transaction level.
        (function setupIMETransactionFilter() {
          var tiptap = editor._tiptapEditor;
          if (!tiptap || !tiptap.view) return;
          var plugins = tiptap.view.state.plugins;
          if (!plugins || !plugins.length) return;
          if (tiptap._imeFilterRegistered) return;
          tiptap._imeFilterRegistered = true;

          var PluginClass = plugins[0].constructor;
          var filterPlugin = new PluginClass({
            filterTransaction: function(tr) {
              if (!imeActive || !tr.docChanged) return true;
              for (var i = 0; i < tr.steps.length; i++) {
                var step = tr.steps[i];
                if (!step.slice || !step.slice.content) continue;
                if (step.slice.content.childCount <= 1) continue;
                // Multiple top-level children in the slice — check if any are
                // block nodes, which indicates a structural split.
                var hasBlock = false;
                step.slice.content.forEach(function(node) {
                  if (node.isBlock) hasBlock = true;
                });
                if (hasBlock) return false;
              }
              return true;
            }
          });

          tiptap.registerPlugin(filterPlugin);
        })();
      }, [editor]);

      return h(BlockNoteView, { editor: editor, theme: theme });
    }

    document.getElementById('loading-indicator').style.display = 'none';
    var root = createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
